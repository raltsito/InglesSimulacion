<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karasuno — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange:       #C8501A;
      --orange-hover: #D96525;
      --orange-glow:  rgba(200, 80, 26, 0.18);
      --dark:         #1A0500;
      --white:        #FAFAFA;
      --border:       #E8E0DA;
      --muted:        #B0A49C;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: radial-gradient(ellipse at 30% 60%, #2A0E00 0%, #0D0300 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* subtle dot grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(200,80,26,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ── MODAL ── */
    .modal {
      width: min(930px, 95vw);
      height: min(580px, 92vh);
      border-radius: 26px;
      overflow: hidden;
      display: flex;
      box-shadow:
        0 50px 120px rgba(0,0,0,0.65),
        0 0 0 1px rgba(200,80,26,0.25);
      animation: appear .7s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes appear {
      from { opacity:0; transform: scale(.94) translateY(22px); }
      to   { opacity:1; transform: scale(1)  translateY(0); }
    }

    /* ══════════════════════════════
       LEFT PANEL
    ══════════════════════════════ */
    .panel-left {
      width: 55%;
      position: relative;
      overflow: hidden;
      background: linear-gradient(155deg,
        #E85D04 0%,
        #F4823A 35%,
        #FAB67A 68%,
        #FFDCB5 100%
      );
    }

    /* atmospheric overlays */
    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 85%, rgba(160,40,0,.55) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%, rgba(255,230,190,.35) 0%, transparent 48%),
        radial-gradient(ellipse at 50% 50%, rgba(190,55,0,.12) 0%, transparent 65%);
      z-index: 1;
    }

    /* hatching texture */
    .panel-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -48deg,
        transparent 0px,
        transparent 38px,
        rgba(255,255,255,.025) 38px,
        rgba(255,255,255,.025) 39px
      );
      z-index: 1;
    }

    /* Left panel text */
    .panel-text {
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      padding: 0 28px;
      z-index: 4;
      text-align: center;
    }
    .panel-text h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1.15;
      text-shadow: 0 3px 18px rgba(0,0,0,0.45);
      margin-bottom: 10px;
    }
    .panel-text p {
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.3px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    /* character image */
    .char-img {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 100%;
      width: 100%;
      object-fit: contain;
      object-position: bottom center;
      z-index: 3;
    }

    /* ══════════════════════════════
       RIGHT PANEL
    ══════════════════════════════ */
    .panel-right {
      width: 45%;
      background: var(--white);
      padding: 48px 44px 40px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Close button */
    .btn-close {
      position: absolute;
      top: 18px; right: 18px;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: #BBB;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, color .2s;
    }
    .btn-close:hover { background: #F0EAE5; color: var(--dark); }

    /* Title */
    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 74px;
      color: var(--dark);
      letter-spacing: 3px;
      line-height: .95;
      margin-bottom: 28px;
      animation: fadeDown .6s .25s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Input wrappers */
    .field {
      position: relative;
      margin-bottom: 13px;
      animation: fadeUp .5s both;
    }
    .field:nth-of-type(1) { animation-delay: .32s; }
    .field:nth-of-type(2) { animation-delay: .40s; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(9px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .field-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }
    .field:focus-within .field-icon { color: var(--orange); }

    input {
      width: 100%;
      height: 52px;
      padding: 0 48px 0 45px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 14.5px;
      color: var(--dark);
      background: #fff;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px var(--orange-glow);
    }
    input::placeholder { color: #C8BBB3; }

    .btn-eye {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      border: none; background: none;
      cursor: pointer; padding: 4px;
      color: var(--muted);
      display: flex; align-items: center;
      transition: color .2s;
    }
    .btn-eye:hover { color: var(--orange); }

    /* Forgot */
    .forgot-row {
      text-align: right;
      margin: 2px 0 18px;
      animation: fadeUp .5s .47s both;
    }
    .forgot-row a {
      font-size: 13px;
      color: var(--dark);
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: rgba(26,5,0,.3);
      transition: color .2s, text-decoration-color .2s;
    }
    .forgot-row a:hover { color: var(--orange); text-decoration-color: var(--orange); }

    /* Log In button */
    .btn-login {
      width: 100%;
      height: 52px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
      transition: background .25s, transform .1s;
      animation: fadeUp .5s .52s both;
    }
    .btn-login::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.13), transparent);
      pointer-events: none;
    }
    .btn-login:hover { background: var(--orange-hover); }
    .btn-login:active { transform: scale(.98); }

    /* Ripple on click */
    .btn-login .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transform: scale(0);
      animation: ripple .55s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      animation: fadeUp .5s .57s both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .divider span {
      font-size: 12px; color: var(--muted);
      letter-spacing: .4px; white-space: nowrap;
    }

    /* Social buttons */
    .social-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      animation: fadeUp .5s .62s both;
    }
    .btn-social {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .btn-social:hover {
      border-color: #C4B5AB;
      transform: translateY(-3px);
      box-shadow: 0 7px 18px rgba(0,0,0,.11);
    }
    .btn-social.apple { background: #111; border-color: #111; }
    .btn-social.apple:hover { border-color: #333; }

    /* Sign up note */
    .signup-note {
      margin-top: auto;
      padding-top: 20px;
      text-align: center;
      font-size: 13.5px;
      color: #B0A49C;
      animation: fadeUp .5s .67s both;
    }
    .signup-note a {
      color: var(--dark); font-weight: 800;
      text-decoration: none;
      transition: color .2s;
    }
    .signup-note a:hover { color: var(--orange); }
  </style>
</head>
<body>

<div class="modal">

  <!-- ══════════════ LEFT PANEL ══════════════ -->
  <div class="panel-left">

    <div class="panel-text">
      <h2>Acceso a la plataforma educativa del Karasuno</h2>
      <p>Creada por Anahí Mendez y Carlos Gonzalez</p>
    </div>

    <!--
      Drop your character image here.
      Name it "hinata.png" (or change src below).
      Recommended: transparent PNG, character facing right.
    -->
    <img
      class="char-img"
      src="hinata.png"
      alt="Hinata Shoyo"
      onerror="this.style.display='none'"
    />
  </div>

  <!-- ══════════════ RIGHT PANEL ══════════════ -->
  <div class="panel-right">

    <!-- Close -->
    <button class="btn-close" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6"  x2="6"  y2="18"/>
        <line x1="6"  y1="6"  x2="18" y2="18"/>
      </svg>
    </button>

    <h1 class="login-title">Login</h1>

    <!-- Email -->
    <div class="field">
      <span class="field-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
      </span>
      <input type="email" placeholder="Email" autocomplete="email"/>
    </div>

    <!-- Password -->
    <div class="field">
      <span class="field-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </span>
      <input type="password" id="pwd" placeholder="Password" autocomplete="current-password"/>
      <button class="btn-eye" onclick="togglePwd()" aria-label="Show/hide password">
        <svg id="eye-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94
                   M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19
                   m-6.72-1.07a3 3 0 11-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>

    <!-- Forgot -->
    <div class="forgot-row">
      <a href="#">Forgot Password?</a>
    </div>

    <!-- Log In -->
    <button class="btn-login" id="loginBtn">Log In</button>

    <!-- Divider -->
    <div class="divider">
      <span>Or Continue With</span>
    </div>

    <!-- Social -->
    <div class="social-row">
      <!-- Google -->
      <button class="btn-social" aria-label="Google">
        <svg width="19" height="19" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
      <!-- Facebook -->
      <button class="btn-social" aria-label="Facebook">
        <svg width="19" height="19" viewBox="0 0 24 24">
          <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </button>
      <!-- Apple -->
      <button class="btn-social apple" aria-label="Apple">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
      </button>
    </div>

    <p class="signup-note">
      Don't have an account? <a href="#">Sign Up here</a>
    </p>

  </div>
</div>

<script>
  /* Toggle password visibility */
  function togglePwd() {
    const input = document.getElementById('pwd');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94
                 M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19
                 m-6.72-1.07a3 3 0 11-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      `;
    }
  }

  /* Ripple on Log In button */
  document.getElementById('loginBtn').addEventListener('click', function(e) {
    const btn  = this;
    const r    = document.createElement('span');
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 1.5;
    r.className = 'ripple';
    r.style.cssText = `
      width:${size}px; height:${size}px;
      left:${e.clientX - rect.left - size/2}px;
      top:${e.clientY - rect.top  - size/2}px;
    `;
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 320);
  });
</script>

</body>
</html>
